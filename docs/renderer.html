<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AND-cascade renderer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; color: #ccc; font: 13px/1.5 monospace;
       display: flex; flex-direction: column; align-items: center;
       padding: 16px; gap: 10px; }
h1 { font-size: 14px; color: #eee; }
canvas { display: block; image-rendering: pixelated; border: 1px solid #333; flex-shrink: 0; }

/* three-column layout: sidebar | canvas | seedpanel */
#layout { display: flex; gap: 12px; align-items: flex-start; }
#sidebar { display: flex; flex-direction: column; gap: 8px; width: 210px; flex-shrink: 0; }
#seedpanel { display: flex; flex-direction: column; gap: 8px; width: 200px; flex-shrink: 0; }
.panel { background: #161616; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px; }
.panel h3 { font-size: 11px; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing:.05em; }

/* dataset selector */
#presets { display: flex; flex-direction: column; gap: 4px; }
.preset-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa;
              padding: 5px 8px; border-radius: 3px; cursor: pointer;
              font: inherit; text-align: left; font-size: 12px; }
.preset-btn:hover { background: #222; border-color: #555; }
.preset-btn.active { background: #1a2a1a; border-color: #4a7a4a; color: #8d8; }
.preset-meta { font-size: 9px; color: #555; margin-top: 1px; }

/* stats */
#stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.stat { background: #1c1c1c; border-radius: 2px; padding: 3px 6px; text-align: center; }
.stat .val { font-size: 15px; color: #eee; }
.stat .lbl { font-size: 9px; color: #555; }

/* layer toggles */
#level-toggles { display: flex; flex-wrap: wrap; gap: 4px; }
.lvl-btn { border: 2px solid #333; border-radius: 4px; padding: 4px 8px;
           cursor: pointer; font: inherit; font-size: 11px;
           background: #1a1a1a; color: #666; transition: all .1s; }
.lvl-btn.on { color: #eee; border-color: var(--c); background: color-mix(in srgb, var(--c) 20%, #1a1a1a); }
.lvl-btn:hover { background: #222; }
.lvl-count { font-size: 9px; opacity:.6; }

/* controls */
#controls { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
button { background: #1e1e1e; border: 1px solid #3a3a3a; color: #ccc;
         padding: 4px 10px; border-radius: 3px; cursor: pointer; font: inherit; }
button:hover { background: #2a2a2a; }
button.on { background: #1e3a1e; border-color: #4a8a4a; color: #8f8; }
button.fmode { background: #1e1e3a; border-color: #4a4a8a; color: #88f; }
button.fmode.on { background: #2a2a5a; border-color: #7a7acf; color: #aaf; }
#scrubber { width: 100%; margin-top: 5px; }
#frame-scrubber { width: 100%; margin-top: 3px; accent-color: #6a6acf; }

/* frame indicator bar */
#frame-bar { display: none; background: #1a1a2a; border: 1px solid #333; border-radius: 3px;
             padding: 5px 8px; font-size: 12px; text-align: center; }
#frame-bar.visible { display: block; }
#frame-num { color: #aaf; font-size: 16px; font-weight: bold; }
#frame-total { color: #446; font-size: 11px; }

/* seed list */
#seedlist { max-height: 420px; overflow-y: auto; font-size: 10px;
            display: flex; flex-direction: column; gap: 1px; }
.seed-row { display: flex; align-items: center; gap: 5px; padding: 2px 4px;
            border-radius: 2px; cursor: pointer; }
.seed-row:hover { background: #1e1e1e; }
.seed-row.active { background: #2a2a18; outline: 1px solid #554; }
.seed-row.off { opacity: .3; }
.seed-dot { width: 8px; height: 8px; border-radius: 1px; flex-shrink: 0; }
.seed-frame-sep { height: 1px; background: #2a2a3a; margin: 2px 0; }

/* dropzone */
#dropzone { border: 1px dashed #2a2a2a; border-radius: 3px; padding: 7px 10px;
            color: #444; cursor: pointer; font-size: 11px; text-align:center;
            width: 100%; max-width: 760px; }
#dropzone:hover,.dropzone.over { border-color: #555; color: #777; }
</style>
</head>
<body>
<h1>LFSR-16 · AND-cascade renderer · XOR-reversible layers</h1>

<div id="dropzone" onclick="document.getElementById('filein').click()">
  drag &amp; drop seed JSON · or click to browse
  <input type="file" id="filein" accept=".json" style="display:none" onchange="loadFile(this)">
</div>

<div id="layout">

<!-- LEFT: controls sidebar -->
<div id="sidebar">

  <div class="panel">
    <h3>dataset</h3>
    <div id="presets"></div>
  </div>

  <div class="panel">
    <h3>stats</h3>
    <div id="stats">
      <div class="stat"><div class="val" id="st-step">0/0</div><div class="lbl">step</div></div>
      <div class="stat"><div class="val" id="st-on">0</div><div class="lbl">active</div></div>
      <div class="stat"><div class="val" id="st-and">—</div><div class="lbl">AND-N</div></div>
      <div class="stat"><div class="val" id="st-lbl">—</div><div class="lbl">layer</div></div>
    </div>
  </div>

  <div class="panel">
    <h3>layers <span style="color:#3a3a3a;font-size:9px">click to toggle</span></h3>
    <div id="level-toggles"></div>
  </div>

  <div class="panel">
    <h3>playback</h3>
    <div id="controls">
      <button onclick="jumpTo(0)" title="rewind">⏮</button>
      <button onclick="stepBy(-1)" title="step back">◀</button>
      <button id="btn-play" onclick="togglePlay()">▶</button>
      <button onclick="stepBy(1)" title="step forward">▶|</button>
      <button onclick="jumpTo(seeds.length)" title="end">⏭</button>
      <button id="btn-fmode" class="fmode" onclick="toggleFrameMode()" style="display:none"
              title="toggle frame-by-frame / seed-by-seed">🎬</button>
      <label style="font-size:11px"><input type="checkbox" id="chk-inv" onchange="redraw()"> inv</label>
    </div>
    <input type="range" id="scrubber" min="0" max="0" value="0" oninput="jumpTo(+this.value)">

    <!-- frame scrubber (animation only) -->
    <div id="frame-controls" style="display:none">
      <div style="display:flex;align-items:center;gap:5px;margin-top:4px;font-size:10px;color:#446">
        frame <span id="fc-num" style="color:#aaf">1</span>/<span id="fc-tot">1</span>
        <input type="range" id="frame-scrubber" min="0" max="0" value="0"
               style="flex:1" oninput="jumpToFrame(+this.value)">
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:6px;margin-top:5px;font-size:10px;color:#555">
      speed <span id="spd-lbl">30/s</span>
      <input type="range" id="speed" min="1" max="300" value="30" style="flex:1"
             oninput="stepsPerSec=+this.value;document.getElementById('spd-lbl').textContent=this.value+'/s'">
    </div>
    <div id="anim-controls" style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px;color:#555">
      frame pause <span id="fp-lbl">300ms</span>
      <input type="range" id="frame-pause" min="0" max="2000" value="300" style="flex:1"
             oninput="framePauseMs=+this.value;document.getElementById('fp-lbl').textContent=this.value+'ms'">
    </div>
  </div>

  <div class="panel">
    <h3>export GIF</h3>
    <div style="display:flex;flex-direction:column;gap:5px">
      <div style="display:flex;gap:5px;align-items:center;font-size:10px;color:#777">
        FPS <input type="number" id="gif-fps" value="10" min="1" max="60"
             style="width:38px;background:#111;border:1px solid #333;color:#ccc;padding:2px 4px;font-size:10px">
        step <input type="number" id="gif-step" value="5" min="1" max="100"
             style="width:38px;background:#111;border:1px solid #333;color:#ccc;padding:2px 4px;font-size:10px">
        loop <input type="number" id="gif-loop" value="0" min="0" max="99"
             style="width:32px;background:#111;border:1px solid #333;color:#ccc;padding:2px 4px;font-size:10px"
             title="0=infinite">
      </div>
      <button onclick="startGifExport()" id="gif-btn">Export GIF</button>
      <div id="gif-status" style="font-size:9px;color:#555;min-height:12px"></div>
    </div>
  </div>

</div><!-- sidebar -->

<!-- CENTER: canvas -->
<div style="display:flex;flex-direction:column;gap:6px;align-items:center">
  <!-- frame indicator (animation mode) -->
  <div id="frame-bar">
    frame <span id="frame-num">1</span><span id="frame-total">/1</span>
  </div>
  <canvas id="cv" width="128" height="96" style="width:512px;height:384px"></canvas>
</div>

<!-- RIGHT: seed list -->
<div id="seedpanel">
  <div class="panel">
    <h3>seeds <span style="color:#3a3a3a;font-size:9px">click = toggle one</span></h3>
    <div id="seedlist"></div>
  </div>
</div>

</div><!-- layout -->

<script>
// ── LFSR-16 ───────────────────────────────────────────────────────────────────
function lfsr16(s) { return (s>>>1)^(s&1?0xB400:0); }

function makeBuf(seed, warmup, andN) {
  let s=seed||1;
  for(let i=0;i<warmup;i++) s=lfsr16(s);
  const buf=new Uint8Array(768);
  for(let i=0;i<768;i++){
    let acc=1;
    for(let k=0;k<andN;k++){s=lfsr16(s);acc&=(s&1);}
    buf[i]=acc;
  }
  return buf;
}

function applyBuf(pix,buf,ox,oy,blk){
  for(let by=0;by<24;by++) for(let bx=0;bx<32;bx++){
    if(!buf[by*32+bx]) continue;
    for(let dy=0;dy<blk;dy++) for(let dx=0;dx<blk;dx++){
      const x=ox+bx*blk+dx, y=oy+by*blk+dy;
      if(x>=0&&x<128&&y>=0&&y<96) pix[y*128+x]^=1;
    }
  }
}

// ── state ─────────────────────────────────────────────────────────────────────
const W=128, H=96;
let seeds=[], bufs=[], active=[], pix=new Uint8Array(W*H);
let cursor=0, snapshots={}, playing=false, stepsPerSec=30;
let animMode=false, frameStarts=[], framePauseMs=300;
let frameMode=false; // true = play frame-by-frame; false = seed-by-seed
let frameTypes=[]; // 'kf' or 'dt' per frame; 'kf' = reset canvas to black

// ── canvas ────────────────────────────────────────────────────────────────────
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const idata=ctx.createImageData(W,H);
function redraw(){
  const inv=document.getElementById('chk-inv').checked;
  for(let i=0;i<W*H;i++){
    const v=(inv?1-pix[i]:pix[i])*255, p=i*4;
    idata.data[p]=idata.data[p+1]=idata.data[p+2]=v; idata.data[p+3]=255;
  }
  ctx.putImageData(idata,0,0);
}

// ── toggle single seed (XOR = free undo) ─────────────────────────────────────
function toggleSeed(i){
  applyBuf(pix,bufs[i],seeds[i].ox,seeds[i].oy,seeds[i].blk);
  active[i]=!active[i];
  document.getElementById('sr-'+i)?.classList.toggle('off',!active[i]);
  updateLevelBtns(); updateStats(); redraw();
}

// ── toggle entire AND-N level ─────────────────────────────────────────────────
function toggleLevel(andN){
  const anyOn=seeds.some((r,i)=>r.and_n===andN&&active[i]);
  for(let i=0;i<seeds.length;i++)
    if(seeds[i].and_n===andN && active[i]===anyOn) toggleSeed(i);
  updateLevelBtns();
}

// ── playback ──────────────────────────────────────────────────────────────────
// kfStarts: set of seed indices where canvas must be reset to black (keyframe boundaries)
let kfStarts = new Set();

function jumpTo(n){
  n=Math.max(0,Math.min(seeds.length,n));
  // Find best snapshot that doesn't cross a keyframe boundary after n
  let base=0;
  for(const k of Object.keys(snapshots).map(Number).sort((a,b)=>a-b)){
    if(k>n) break;
    // Only use snapshot if no kfStart lies between k and n that would invalidate it
    // (i.e. snapshot was built with the correct canvas state)
    base=k;
  }
  pix=snapshots[base].slice();
  for(let i=0;i<seeds.length;i++) active[i]=i<base;
  for(let i=base;i<n;i++){
    if(kfStarts.has(i)) pix=new Uint8Array(W*H); // canvas reset at keyframe
    applyBuf(pix,bufs[i],seeds[i].ox,seeds[i].oy,seeds[i].blk);
    active[i]=true;
  }
  cursor=n; updateUI(); redraw();
}
function stepBy(d){jumpTo(cursor+d);}

function currentFrame(){
  if(!animMode||!frameStarts.length) return -1;
  let f=0;
  for(let i=0;i<frameStarts.length;i++) if(cursor>=frameStarts[i]) f=i;
  return f;
}

function jumpToFrame(fi){
  if(!animMode||!frameStarts.length) return;
  fi=Math.max(0,Math.min(frameStarts.length-1,fi));
  jumpTo(frameStarts[fi]);
}

function toggleFrameMode(){
  frameMode=!frameMode;
  document.getElementById('btn-fmode').classList.toggle('on',frameMode);
  document.getElementById('btn-fmode').title = frameMode
    ? 'mode: frame-by-frame (click to switch to seed-by-seed)'
    : 'mode: seed-by-seed (click to switch to frame-by-frame)';
}

function togglePlay(){
  playing=!playing;
  document.getElementById('btn-play').classList.toggle('on',playing);
  document.getElementById('btn-play').textContent=playing?'⏸':'▶';
  if(playing) tick();
}

function tick(){
  if(!playing) return;
  if(cursor>=seeds.length){togglePlay();return;}

  if(frameMode && animMode && frameStarts.length>1){
    // Frame-by-frame mode: jump to next frame boundary
    const fi=currentFrame();
    const nextFi=fi+1;
    if(nextFi>=frameStarts.length){ togglePlay(); return; }
    jumpTo(frameStarts[nextFi]);
    updateUI(); redraw();
    setTimeout(tick, Math.max(50, framePauseMs));
    return;
  }

  // Seed-by-seed mode: pause briefly at frame boundaries
  if(animMode && frameStarts.length>1 && cursor>0){
    const nextFrameIdx=frameStarts.findIndex(s=>s===cursor);
    if(nextFrameIdx>0){
      updateUI(); redraw();
      setTimeout(tick, framePauseMs);
      return;
    }
  }
  if(kfStarts.has(cursor)) pix=new Uint8Array(W*H); // canvas reset at keyframe
  applyBuf(pix,bufs[cursor],seeds[cursor].ox,seeds[cursor].oy,seeds[cursor].blk);
  active[cursor]=true; cursor++;
  updateUI(); redraw();
  setTimeout(tick,1000/stepsPerSec);
}

// ── load ──────────────────────────────────────────────────────────────────────
function loadSeeds(data, presetId){
  animMode = data.type==='animation_flat' || data.type==='animation';
  frameStarts = animMode ? (data.frame_starts||[]) : [];

  let rawSeeds = [];
  if(animMode && data.type==='animation_flat'){
    rawSeeds = (data.seeds||[]).map(r=>({
      seed:  r.seed ?? r.s,
      ox:    r.ox,
      oy:    r.oy,
      blk:   r.blk ?? r.b,
      and_n: r.and_n ?? r.n,
      warmup:r.warmup ?? r.w ?? 0,
      frame: r.f ?? 0,
      label: r.label || ('F'+(r.f??0)+'-AND'+(r.and_n??r.n)),
      step:  r.step ?? 0
    }));
  } else if(animMode && data.frames){
    rawSeeds=[];
    for(const fr of data.frames) for(const s of fr.seeds) rawSeeds.push(s);
  } else {
    rawSeeds = data.seeds||data;
  }

  seeds = rawSeeds;
  bufs=seeds.map(r=>makeBuf(r.seed,r.warmup,r.and_n));
  active=new Array(seeds.length).fill(false);
  pix=new Uint8Array(W*H); cursor=0;

  // Build kfStarts: set of seed indices where canvas resets (frame_types='kf', frame>0)
  frameTypes = data.frame_types || [];
  kfStarts = new Set();
  if(frameTypes.length && frameStarts.length){
    for(let fi=1; fi<frameStarts.length; fi++){
      if(frameTypes[fi]==='kf') kfStarts.add(frameStarts[fi]);
    }
  }

  // Build snapshots, respecting canvas resets at keyframe boundaries
  snapshots={0:new Uint8Array(W*H)};
  let s=new Uint8Array(W*H);
  for(let i=0;i<seeds.length;i++){
    if(kfStarts.has(i)) s=new Uint8Array(W*H); // canvas reset at keyframe
    applyBuf(s,bufs[i],seeds[i].ox,seeds[i].oy,seeds[i].blk);
    if((i+1)%100===0||i===seeds.length-1) snapshots[i+1]=s.slice();
  }
  document.getElementById('scrubber').max=seeds.length;

  // frame scrubber + frame UI
  const hasFrames = animMode && frameStarts.length>1;
  document.getElementById('frame-controls').style.display = hasFrames ? '' : 'none';
  document.getElementById('frame-bar').classList.toggle('visible', hasFrames);
  document.getElementById('btn-fmode').style.display = hasFrames ? '' : 'none';
  if(hasFrames){
    const fs = document.getElementById('frame-scrubber');
    fs.max = frameStarts.length-1; fs.value=0;
    document.getElementById('fc-tot').textContent = frameStarts.length;
    document.getElementById('frame-total').textContent = '/'+frameStarts.length;
  }

  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  if(presetId) document.getElementById('pb-'+presetId)?.classList.add('active');
  buildLevelBtns(); buildSeedList(); updateUI(); redraw();
}

// ── UI ────────────────────────────────────────────────────────────────────────
const AND_COL={3:'#4b9a5a',4:'#5588c0',5:'#c09030',6:'#c06028',7:'#d03030'};

function buildLevelBtns(){
  const el=document.getElementById('level-toggles'); el.innerHTML='';
  const levels=[...new Set(seeds.map(r=>r.and_n))].sort((a,b)=>a-b);
  for(const n of levels){
    const count=seeds.filter(r=>r.and_n===n).length;
    const col=AND_COL[n]||'#888';
    const btn=document.createElement('button');
    btn.className='lvl-btn'; btn.id='lvl-'+n;
    btn.style.setProperty('--c',col);
    btn.innerHTML=`AND-${n}<br><span class="lvl-count">${count} seeds</span>`;
    btn.onclick=()=>toggleLevel(n);
    el.appendChild(btn);
  }
  updateLevelBtns();
}

function updateLevelBtns(){
  const levels=[...new Set(seeds.map(r=>r.and_n))];
  for(const n of levels){
    const anyOn=seeds.some((r,i)=>r.and_n===n&&active[i]);
    document.getElementById('lvl-'+n)?.classList.toggle('on',anyOn);
  }
}

function buildSeedList(){
  const el=document.getElementById('seedlist'); el.innerHTML='';
  let lastFrame=-1;
  for(let i=0;i<seeds.length;i++){
    const r=seeds[i]; const col=AND_COL[r.and_n]||'#888';
    // frame separator for animation
    if(animMode && frameStarts.length>1){
      const fi = frameStarts.lastIndexOf(i);
      if(fi>0){
        const sep=document.createElement('div');
        sep.className='seed-frame-sep';
        sep.title='frame '+fi;
        el.appendChild(sep);
      }
    }
    const div=document.createElement('div');
    div.className='seed-row off'; div.id='sr-'+i;
    div.innerHTML=`<div class="seed-dot" style="background:${col}"></div>
      <span style="color:#555">${i+1}</span>
      <span style="color:#777">AND${r.and_n}</span>
      <span style="color:#444">${r.ox},${r.oy}×${r.blk}</span>`;
    div.onclick=()=>toggleSeed(i);
    div.title=`seed=${r.seed} warmup=${r.warmup} label=${r.label}`;
    el.appendChild(div);
  }
}

function updateStats(){
  document.getElementById('st-on').textContent=active.filter(Boolean).length;
}
function updateUI(){
  const r=seeds[cursor-1];
  document.getElementById('st-step').textContent=cursor+'/'+seeds.length;
  document.getElementById('st-and').textContent=r?'AND-'+r.and_n:'—';
  document.getElementById('st-lbl').textContent=r?r.label.replace(/L3p\d+-/,''):'—';
  document.getElementById('scrubber').value=cursor;
  if(animMode && frameStarts.length){
    const fi=currentFrame();
    const fn=fi+1;
    // frame bar (above canvas)
    document.getElementById('frame-num').textContent=fn;
    // frame scrubber
    const fs=document.getElementById('frame-scrubber');
    if(fs) { fs.value=fi; document.getElementById('fc-num').textContent=fn; }
  }
  updateStats(); updateLevelBtns();
  // seed list scroll
  const prev=document.querySelector('.seed-row.active');
  if(prev) prev.classList.remove('active');
  const cur=document.getElementById('sr-'+(cursor-1));
  if(cur){cur.classList.add('active');if(playing)cur.scrollIntoView({block:'nearest'});}
  for(let i=0;i<seeds.length;i++)
    document.getElementById('sr-'+i)?.classList.toggle('off',!active[i]);
}

// ── presets ───────────────────────────────────────────────────────────────────
const PRESETS=[
  {id:'badapple',label:'Bad Apple!! 🍎',  meta:'1643 frames · kf/100 · budget kf=256 dt=64 · ~55min encode',
   paths:['../data/badapple_anim.json','data/badapple_anim.json']},
  {id:'foveal',  label:'Foveal AND-3→7 ★', meta:'939 seeds · 0.06% @1209 · CUDA 28s',
   paths:['../data/foveal_cascade_seeds.json','data/foveal_cascade_seeds.json']},
  {id:'che_anim',label:'Che animation 🎬',  meta:'25 frames · 16,114 seeds · 0.07% avg · delta',
   paths:['../data/che_anim_flat.json','data/che_anim_flat.json']},
  {id:'che_unw128v2',label:'Che unweighted (128) ★',  meta:'25 frames · 4104 seeds · AND-3→7 · best overall',
   paths:['../data/che_unw128_v2_anim.json','data/che_unw128_v2_anim.json']},
  {id:'che_wgt128',label:'Che weighted 👁 (128)',  meta:'25 frames · 4116 seeds · face heatmap · face zone priority',
   paths:['../data/che_wgt128_anim.json','data/che_wgt128_anim.json']},
  {id:'che_aw128',label:'Che auto-weight 4:1 (128)',  meta:'25 frames · 4121 seeds · dynamic wrong-pixel priority',
   paths:['../data/che_aw128_anim.json','data/che_aw128_anim.json']},
  {id:'che_wgt64',label:'Che weighted 👁 (64)',  meta:'25 frames · 2585 seeds · heatmap face · 47% less face err',
   paths:['../data/che_weighted64_anim.json','data/che_weighted64_anim.json']},
  {id:'che_unw64',label:'Che unweighted (64)',  meta:'25 frames · 2585 seeds · no heatmap · compare',
   paths:['../data/che_unweighted64_anim.json','data/che_unweighted64_anim.json']},
  {id:'bgt_a',label:'Budget A · KF256/DT128', meta:'10 frames · 1384 seeds · shrink=0.90 · 23%→14%',
   paths:['../data/budget_conf_a.json','data/budget_conf_a.json']},

function buildPresets(){
  const el=document.getElementById('presets');
  for(const p of PRESETS){
    const btn=document.createElement('button');
    btn.className='preset-btn'; btn.id='pb-'+p.id;
    btn.innerHTML=`${p.label}<div class="preset-meta">${p.meta}</div>`;
    btn.onclick=()=>fetchPreset(p);
    el.appendChild(btn);
  }
}

function fetchPreset(p){
  const tryNext=(i)=>{
    if(i>=p.paths.length){alert('Could not load '+p.label+'. Drop JSON manually.');return;}
    fetch(p.paths[i]).then(r=>{if(!r.ok)throw 0;return r.json();})
      .then(d=>loadSeeds(d,p.id)).catch(()=>tryNext(i+1));
  };
  tryNext(0);
}

function loadFile(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>loadSeeds(JSON.parse(e.target.result));
  rd.readAsText(f);
}

const dz=document.getElementById('dropzone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('over');
  const f=e.dataTransfer.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>loadSeeds(JSON.parse(ev.target.result));
  rd.readAsText(f);
});

// ── GIF export ────────────────────────────────────────────────────────────────
function lzwEncode(data, minCodeSize) {
  const clearCode = 1 << minCodeSize;
  const eoi = clearCode + 1;
  let codeSize = minCodeSize + 1;
  let nextCode = eoi + 1;
  const table = new Map();
  const bits = []; let buf = 0, nbits = 0;

  const initTable = () => {
    table.clear();
    for (let i = 0; i < clearCode; i++) table.set(''+i, i);
    codeSize = minCodeSize + 1; nextCode = eoi + 1;
  };
  const emit = (code) => {
    buf |= code << nbits; nbits += codeSize;
    while (nbits >= 8) { bits.push(buf & 0xFF); buf >>= 8; nbits -= 8; }
  };

  initTable(); emit(clearCode);
  let prefix = '';
  for (let i = 0; i < data.length; i++) {
    const px = data[i];
    const key = prefix === '' ? ''+px : prefix+','+px;
    if (table.has(key)) { prefix = key; continue; }
    emit(table.get(prefix === '' ? ''+px : prefix));
    table.set(key, nextCode++);
    prefix = ''+px;
    if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
    if (nextCode > 4094) { emit(clearCode); initTable(); }
  }
  if (prefix !== '') emit(table.get(prefix));
  emit(eoi);
  if (nbits > 0) bits.push(buf & 0xFF);
  return bits;
}

function buildGIF(frames, delayCs, loopCount) {
  const b = [];
  const u16le = (v) => [v & 0xFF, v >> 8];
  const push = (v) => b.push(v);
  const seq = (arr) => arr.forEach(v => b.push(v));

  seq([0x47,0x49,0x46,0x38,0x39,0x61]); // GIF89a
  seq(u16le(W)); seq(u16le(H));
  push(0x80); push(0); push(0);
  seq([0,0,0, 255,255,255]); // GCT: 0=black, 1=white

  seq([0x21,0xFF,0x0B]);
  seq([78,69,84,83,67,65,80,69,50,46,48]); // NETSCAPE2.0
  push(3); push(1); seq(u16le(loopCount)); push(0);

  for (const frame of frames) {
    seq([0x21,0xF9,0x04, 0x00]); seq(u16le(delayCs)); push(0); push(0);
    push(0x2C); seq(u16le(0)); seq(u16le(0)); seq(u16le(W)); seq(u16le(H)); push(0);
    const lzw = lzwEncode(frame, 2);
    push(2);
    for (let i = 0; i < lzw.length; ) {
      const chunk = Math.min(255, lzw.length - i);
      push(chunk);
      for (let j = 0; j < chunk; j++) push(lzw[i++]);
    }
    push(0);
  }
  push(0x3B);
  return new Uint8Array(b);
}

function captureFrame(inv) {
  const f = new Uint8Array(W * H);
  for (let i = 0; i < W*H; i++) f[i] = inv ? 1 - pix[i] : pix[i];
  return f;
}

async function startGifExport() {
  if (!seeds.length) { alert('Load a preset first'); return; }
  const fps    = Math.max(1, Math.min(60, +document.getElementById('gif-fps').value  || 10));
  const step   = Math.max(1, Math.min(100,+document.getElementById('gif-step').value || 5));
  const loop   = Math.max(0, +document.getElementById('gif-loop').value || 0);
  const inv    = document.getElementById('chk-inv').checked;
  const delayCs = Math.round(100 / fps);
  const status = document.getElementById('gif-status');
  const btn = document.getElementById('gif-btn');

  btn.disabled = true;
  const frames = [];
  const savedCursor = cursor;

  const blank = new Uint8Array(W * H);
  frames.push(inv ? blank.map(v => 1 - v) : blank.slice());

  let s = new Uint8Array(W * H);
  for (let i = 0; i < seeds.length; i++) {
    applyBuf(s, bufs[i], seeds[i].ox, seeds[i].oy, seeds[i].blk);
    if ((i + 1) % step === 0 || i === seeds.length - 1) {
      const f = new Uint8Array(W * H);
      for (let j = 0; j < W*H; j++) f[j] = inv ? 1 - s[j] : s[j];
      frames.push(f);
      if (frames.length % 10 === 0) {
        status.textContent = `encoding… ${i+1}/${seeds.length} steps, ${frames.length} frames`;
        await new Promise(r => setTimeout(r, 0));
      }
    }
  }

  jumpTo(savedCursor);

  status.textContent = `building GIF (${frames.length} frames)…`;
  await new Promise(r => setTimeout(r, 0));

  const gif = buildGIF(frames, delayCs, loop);
  const blob = new Blob([gif], { type: 'image/gif' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cascade_animation.gif'; a.click();
  URL.revokeObjectURL(url);

  status.textContent = `done: ${frames.length} frames, ${(gif.length/1024).toFixed(0)} KB`;
  btn.disabled = false;
}
